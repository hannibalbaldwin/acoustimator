name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full:
        description: "Run full E2E (requires ANTHROPIC_API_KEY)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: uv sync --frozen

      - name: Install frontend deps
        run: pnpm install --prefix frontend

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Start backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ""
          AUTH_SECRET: "ci-test-secret-not-for-production"
          E2E_AUTH_BYPASS: "true"
        run: cd frontend && pnpm build

      - name: Start Next.js
        env:
          AUTH_SECRET: "ci-test-secret-not-for-production"
          E2E_AUTH_BYPASS: "true"
        run: cd frontend && pnpm start &

      - name: Wait for services
        run: |
          echo "Waiting for backend on :8000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo " backend ready" && break
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Waiting for frontend on :3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && echo " frontend ready" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run smoke tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ""
        run: cd frontend && pnpm exec playwright test --grep "@smoke"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: frontend/playwright-report/
          retention-days: 7

  full-e2e:
    name: Full E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: uv sync --frozen

      - name: Install frontend deps
        run: pnpm install --prefix frontend

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Start backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ""
        run: cd frontend && pnpm build

      - name: Start Next.js
        run: cd frontend && pnpm start &

      - name: Wait for services
        run: |
          echo "Waiting for backend on :8000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo " backend ready" && break
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Waiting for frontend on :3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && echo " frontend ready" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run full E2E tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ""
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd frontend && pnpm exec playwright test tests/e2e/new-estimate.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full
          path: frontend/playwright-report/
          retention-days: 7
